server {
    listen 80;
    #server_name localhost;  # Для разработки
    server_name astro.tsu.ru;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name astro.tsu.ru;

    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
   
    # Статика Django (админка и собственная статика)
    location /static/ {
        alias /staticfiles/;   # путь внутри контейнера frontend (куда смонтирован том static_volume)
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Медиафайлы (загруженные через админку)
    location /media/ {
        alias /media/;         # путь внутри контейнера frontend (куда смонтирован том media_volume)
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API и админка Django – проксируются на бэкенд
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # React-приложение (корень)
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }
}